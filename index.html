<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>주변 기독교서점 찾기</title>
<meta name="description" content="내 위치로 가까운 기독교 서점을 바로 찾으세요. 전국 기독교서점 전화·길안내 연결.">
<meta name="theme-color" content="#1a5d3a">
<!-- 카카오톡/SNS 공유 미리보기 (Open Graph) -->
<meta property="og:type" content="website">
<meta property="og:title" content="주변 기독교서점 찾기">
<meta property="og:description" content="내 위치로 가까운 기독교 서점을 바로 찾으세요. 전국 기독교서점 전화·길안내 연결.">
<meta property="og:image" content="https://maddog78111-bit.github.io/christian-bookstore-finder/og.png">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="400">
<meta property="og:url" content="https://maddog78111-bit.github.io/christian-bookstore-finder/">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --green:#1a5d3a; --light:#e8f3ec; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  body { display:flex; flex-direction:column; }
  header { background:var(--green); color:#fff; padding:10px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  header h1 { font-size:17px; margin:0; flex-shrink:0; }
  #search { flex:1; min-width:0; padding:7px 10px; border:none; border-radius:18px; font-size:14px; outline:none; }
  #map { flex:1; min-height:38vh; }
  #locateBtn { position:absolute; z-index:1000; right:12px; margin-top:12px; width:42px; height:42px; border-radius:50%;
    background:#fff; border:none; box-shadow:0 2px 6px rgba(0,0,0,.35); font-size:20px; cursor:pointer; }
  #list { height:42vh; overflow-y:auto; background:#fafafa; flex-shrink:0; -webkit-overflow-scrolling:touch; }
  .store { background:#fff; margin:8px 10px; padding:12px 14px; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.12); }
  .store-top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .store-name { font-weight:bold; font-size:15px; color:#222; }
  .store-dist { color:var(--green); font-weight:bold; font-size:13px; white-space:nowrap; }
  .store-addr { font-size:12.5px; color:#666; margin-top:4px; line-height:1.45; }
  .store-actions { display:flex; gap:6px; margin-top:9px; }
  .btn { flex:1; text-align:center; padding:9px 2px; border-radius:8px; font-size:12.5px; text-decoration:none; font-weight:bold; white-space:nowrap; }
  .btn-call { background:var(--light); color:var(--green); }
  .btn-kakao { background:#FEE500; color:#3A1D1D; }
  .btn-naver { background:#03C75A; color:#fff; }
  .btn[aria-disabled="true"] { opacity:.4; pointer-events:none; }
  .store.active { outline:2px solid var(--green); box-shadow:0 0 0 4px rgba(26,93,58,.15); }
  #status { text-align:center; font-size:12.5px; color:#888; padding:8px; }
  #status.notice { color:#555; line-height:1.7; padding:18px 16px; font-size:13.5px; }
  #status.notice b { color:var(--green); }
  .retry { margin-top:12px; background:var(--green); color:#fff; border:none; border-radius:8px;
    padding:9px 20px; font-size:13px; font-weight:bold; cursor:pointer; }
  body.big #status.notice { font-size:15.5px; }
  #count { position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #eee;
    font-size:13px; color:#444; padding:9px 14px; font-weight:bold; }
  #count b { color:var(--green); }
  #chips { display:flex; gap:7px; overflow-x:auto; padding:8px 10px; background:#fff;
    border-bottom:1px solid #eee; flex-shrink:0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  #chips::-webkit-scrollbar { display:none; }
  .chip { flex:0 0 auto; padding:6px 14px; border-radius:16px; border:1px solid #cfe0d5;
    background:#fff; color:#333; font-size:13px; cursor:pointer; white-space:nowrap; }
  .chip.active { background:var(--green); color:#fff; border-color:var(--green); font-weight:bold; }
  #fontBtn { flex-shrink:0; background:rgba(255,255,255,.2); color:#fff; border:1px solid rgba(255,255,255,.7);
    border-radius:14px; padding:5px 10px; font-size:13px; font-weight:bold; cursor:pointer; line-height:1; }
  #fontBtn.on { background:#fff; color:var(--green); }
  /* 큰글씨 모드 */
  body.big header h1 { font-size:19px; }
  body.big #search { font-size:16px; }
  body.big .chip { font-size:15px; padding:8px 16px; }
  body.big #count { font-size:15px; }
  body.big .store-name { font-size:18px; }
  body.big .store-dist { font-size:15px; }
  body.big .store-addr { font-size:15px; }
  body.big .btn { font-size:15px; padding:11px 2px; }
  body.big #status { font-size:14.5px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<header>
  <h1>📖 주변 기독교서점</h1>
  <input id="search" type="search" placeholder="서점명·지역 검색 (예: 부산)">
  <button id="fontBtn" type="button" title="큰글씨" aria-pressed="false">가＋</button>
</header>
<div id="chips"></div>
<div id="map"></div>
<div id="list"><div id="status">위치 확인 중…</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="stores.js"></script>
<script>
const map = L.map('map', { zoomControl:false }).setView([36.5, 127.8], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const locateBtn = document.createElement('button');
locateBtn.id = 'locateBtn'; locateBtn.title = '내 위치'; locateBtn.textContent = '📍';
document.getElementById('map').appendChild(locateBtn);

const storeIcon = L.divIcon({ className:'',
  html:'<svg width="24" height="35" viewBox="0 0 26 38"><path d="M13 0C5.8 0 0 5.8 0 13c0 9.8 13 25 13 25s13-15.2 13-25C26 5.8 20.2 0 13 0z" fill="#1a5d3a"/><circle cx="13" cy="13" r="5.5" fill="#fff"/></svg>',
  iconSize:[24,35], iconAnchor:[12,35], popupAnchor:[0,-33] });

let myPos = null, myMarker = null;

function dist(a, b, c, d) {
  const R = 6371, p = Math.PI/180;
  const x = Math.sin((c-a)*p/2)**2 + Math.cos(a*p)*Math.cos(c*p)*Math.sin((d-b)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function fmtDist(km) { return km < 1 ? Math.round(km*1000)+'m' : km.toFixed(1)+'km'; }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 주소 → 시/도 분류 (표기 흔들림 + 시·도 생략 주소 보정)
function regionOf(addr) {
  const a = String(addr).trim();
  if (/^서울/.test(a)) return '서울';
  if (/^부산/.test(a)) return '부산';
  if (/^대구/.test(a)) return '대구';
  if (/^인천/.test(a)) return '인천';
  if (/^대전/.test(a)) return '대전';
  if (/^울산/.test(a)) return '울산';
  if (/^광주/.test(a)) return '광주';
  if (/^(세종|충청남도 연기|충남 연기)/.test(a)) return '세종';
  if (/^경기/.test(a)) return '경기';
  if (/^강원/.test(a)) return '강원';
  if (/^(충청북도|충북)/.test(a)) return '충북';
  if (/^(충청남도|충남)/.test(a)) return '충남';
  if (/^(전라북도|전북)/.test(a)) return '전북';
  if (/^(전라남도|전남)/.test(a)) return '전남';
  if (/^(경상북도|경북)/.test(a)) return '경북';
  if (/^(경상남도|경남)/.test(a)) return '경남';
  if (/^제주/.test(a)) return '제주';
  // 시/도 접두어가 생략된 주소 보정 (구·시명으로 판정)
  if (/(종로구|용산구|성동구|광진구|동대문구|중랑구|성북구|강북구|도봉구|노원구|은평구|서대문구|마포구|양천구|강서구|구로구|금천구|영등포구|동작구|관악구|서초구|강남구|송파구|강동구)/.test(a)) return '서울';
  if (/(부천시|안산시|수원시|성남시|용인시|고양시|안양시|군포시|김포시|광명시|평택시|시흥시|화성시|남양주시|의정부시|파주시|오산시|이천시)/.test(a)) return '경기';
  if (/창원시/.test(a)) return '경남';
  if (/군산시/.test(a)) return '전북';
  if (/충주시/.test(a)) return '충북';
  return '기타';
}
const REGION_ORDER = ['서울','경기','인천','부산','대구','광주','대전','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];
let activeRegion = null;

const markers = {};
STORES.forEach((s, i) => {
  const nm = encodeURIComponent(s.n.replace(/,/g,' '));
  markers[i] = L.marker([s.la, s.lo], { icon: storeIcon })
    .bindPopup('<b>' + s.n + '</b><br><small>' + s.a + '</small>' +
      (s.t ? '<br><a href="tel:' + s.t.replace(/[^0-9+]/g,'') + '">📞 ' + s.t + '</a>' : '') +
      '<br>🧭 <a target="_blank" rel="noopener" href="https://map.kakao.com/link/to/' + nm + ',' + s.la + ',' + s.lo + '">카카오</a>' +
      ' · <a target="_blank" rel="noopener" href="https://map.naver.com/p/directions/-/' + s.lo + ',' + s.la + ',' + nm + '/-/car">네이버</a>')
    .on('click', () => focusStoreInList(i))
    .addTo(map);
});

// 마커 클릭 시 아래 목록에서 해당 서점으로 스크롤 + 강조
function focusStoreInList(i) {
  const listEl = document.getElementById('list');
  let card = listEl.querySelector('.store[data-i="' + i + '"]');
  if (!card) {  // 검색으로 가려져 있으면 검색을 비우고 다시 표시
    const search = document.getElementById('search');
    if (search.value) { search.value = ''; render(''); }
    card = listEl.querySelector('.store[data-i="' + i + '"]');
  }
  if (!card) return;
  listEl.querySelectorAll('.store.active').forEach(e => e.classList.remove('active'));
  card.classList.add('active');
  const target = listEl.scrollTop + (card.getBoundingClientRect().top - listEl.getBoundingClientRect().top) - 6;
  smoothScrollTo(listEl, Math.max(0, target));
}

// scroll-behavior 미지원 브라우저에서도 동작하는 부드러운 스크롤
function smoothScrollTo(el, target) {
  const start = el.scrollTop, diff = target - start, dur = 320;
  let t0 = null;
  function step(ts) {
    if (t0 === null) t0 = ts;
    const p = Math.min((ts - t0) / dur, 1);
    const ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;
    el.scrollTop = start + diff * ease;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function render(filter) {
  const list = document.getElementById('list');
  let items = STORES.map((s, i) => ({ ...s, i, d: myPos ? dist(myPos.lat, myPos.lng, s.la, s.lo) : null }));
  if (activeRegion) items = items.filter(s => regionOf(s.a) === activeRegion);
  if (filter) {
    const f = filter.toLowerCase();
    items = items.filter(s => s.n.toLowerCase().includes(f) || s.a.toLowerCase().includes(f));
  }
  if (myPos) items.sort((a, b) => a.d - b.d);

  const total = STORES.length;
  let countText;
  if (filter) countText = '‘' + esc(filter) + '’ 검색 · <b>' + items.length + '곳</b>';
  else if (activeRegion) countText = activeRegion + ' · <b>' + items.length + '곳</b>';
  else if (myPos) countText = '가까운 순 · 전국 <b>' + total + '곳</b>';
  else countText = '전국 <b>' + total + '곳</b>';

  let html = '<div id="count">' + countText + '</div>';
  if (!myPos && !filter && !activeRegion) html += '<div id="status">📍 버튼을 누르면 가까운 순으로 정렬됩니다</div>';
  if (!items.length) html += '<div id="status">검색 결과가 없습니다</div>';
  items.forEach(s => {
    const telClean = (s.t || '').replace(/[^0-9+]/g, '');
    html += '<div class="store" data-i="' + s.i + '">'
      + '<div class="store-top"><span class="store-name">' + s.n + '</span>'
      + (s.d != null ? '<span class="store-dist">' + fmtDist(s.d) + '</span>' : '') + '</div>'
      + '<div class="store-addr">' + s.a + '</div>'
      + '<div class="store-actions">'
      + '<a class="btn btn-call" ' + (telClean ? 'href="tel:' + telClean + '"' : 'aria-disabled="true"') + '>📞 전화</a>'
      + '<a class="btn btn-kakao" target="_blank" rel="noopener" href="https://map.kakao.com/link/to/' + encodeURIComponent(s.n.replace(/,/g,' ')) + ',' + s.la + ',' + s.lo + '">카카오</a>'
      + '<a class="btn btn-naver" target="_blank" rel="noopener" href="https://map.naver.com/p/directions/-/' + s.lo + ',' + s.la + ',' + encodeURIComponent(s.n.replace(/,/g,' ')) + '/-/car">네이버</a>'
      + '</div></div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('.store').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('a')) return;
      const m = markers[el.dataset.i];
      map.setView(m.getLatLng(), 14);
      m.openPopup();
    });
  });

  // 검색·지역 선택 시 결과 위치로 지도 이동
  if ((filter || activeRegion) && items.length) {
    const pts = items.map(s => [s.la, s.lo]);
    if (items.length === 1) {
      map.setView(pts[0], 14);
      markers[items[0].i].openPopup();
    } else {
      map.fitBounds(L.latLngBounds(pts).pad(0.15));
    }
  }
}

// 위치 실패/미지원 시 안내 박스 + 지역·검색 유도 + 다시 시도 버튼
function showLocateNotice(msg) {
  render('');
  const st = document.getElementById('status');
  if (!st) return;
  st.classList.add('notice');
  st.innerHTML = '📍 ' + msg
    + '<br>위쪽에서 <b>지역</b>을 선택하거나 서점명으로 검색해 보세요.'
    + '<br><button id="retryLoc" type="button" class="retry">📍 다시 시도</button>';
  const btn = document.getElementById('retryLoc');
  if (btn) btn.addEventListener('click', locate);
}

function locate() {
  if (!navigator.geolocation) {
    showLocateNotice('이 브라우저는 위치 기능을 지원하지 않아요.');
    return;
  }
  document.getElementById('status') && (document.getElementById('status').textContent = '위치 확인 중…');
  navigator.geolocation.getCurrentPosition(pos => {
    myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (myMarker) myMarker.remove();
    myMarker = L.circleMarker([myPos.lat, myPos.lng], {
      radius:9, color:'#fff', weight:3, fillColor:'#2a7de1', fillOpacity:1
    }).addTo(map).bindTooltip('내 위치');
    map.setView([myPos.lat, myPos.lng], 12);
    render(document.getElementById('search').value.trim());
  }, err => {
    let msg;
    if (err.code === 1) msg = '위치 접근이 꺼져 있어요.';
    else if (err.code === 3) msg = '위치 확인이 지연되고 있어요.';
    else msg = '위치를 확인할 수 없어요.';
    showLocateNotice(msg);
  }, { enableHighAccuracy:true, timeout:10000 });
}

// 시/도 칩: 데이터에 실제 존재하는 지역만 표시
function buildChips() {
  const present = new Set(STORES.map(s => regionOf(s.a)));
  const regions = REGION_ORDER.filter(r => present.has(r));
  const bar = document.getElementById('chips');
  bar.innerHTML = '<button class="chip" data-region="">전체</button>'
    + regions.map(r => '<button class="chip" data-region="' + r + '">' + r + '</button>').join('');
  bar.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const r = c.dataset.region || null;
      activeRegion = (activeRegion === r) ? null : r;  // 같은 칩 다시 누르면 해제
      const search = document.getElementById('search');
      if (activeRegion) search.value = '';            // 지역 선택 시 검색어 비움
      updateChips();
      render(search.value.trim());
    });
  });
  updateChips();
}
function updateChips() {
  document.querySelectorAll('#chips .chip').forEach(c => {
    c.classList.toggle('active', (c.dataset.region || null) === activeRegion);
  });
}

// 큰글씨 토글 (설정은 localStorage에 저장 → 다음 방문에도 유지)
const fontBtn = document.getElementById('fontBtn');
function applyBig(on) {
  document.body.classList.toggle('big', on);
  fontBtn.classList.toggle('on', on);
  fontBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
  setTimeout(() => map.invalidateSize(), 0);  // 헤더/칩 높이 변동 시 지도 영역 재계산
}
let bigOn = false;
try { bigOn = localStorage.getItem('bigFont') === '1'; } catch (e) {}
applyBig(bigOn);
fontBtn.addEventListener('click', () => {
  bigOn = !bigOn;
  try { localStorage.setItem('bigFont', bigOn ? '1' : '0'); } catch (e) {}
  applyBig(bigOn);
});

locateBtn.addEventListener('click', locate);
document.getElementById('search').addEventListener('input', e => {
  if (e.target.value.trim()) { activeRegion = null; updateChips(); }  // 검색하면 지역칩 해제
  render(e.target.value.trim());
});

buildChips();
render('');
locate();

if ('serviceWorker' in navigator) {
  // 새 서비스워커가 제어를 넘겨받으면 한 번 자동 새로고침 → 항상 최신 데이터
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    location.reload();
  });
  // 등록 후 즉시 업데이트 확인 (sw.js는 install 시 skipWaiting → 새 버전이 바로 활성화)
  navigator.serviceWorker.register('sw.js').then(reg => reg.update());
  // 탭이 다시 보일 때 업데이트 체크
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      navigator.serviceWorker.getRegistration().then(r => r && r.update());
    }
  });
}
</script>
</body>
</html>
